<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      padding: 20px;
      margin: 0;
      color: #333;
    }
    h1 {
      color: #003366;
      font-size: 20px;
      margin-top: 0;
    }
    .config-box {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 20px;
      max-height: 200px;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th {
      text-align: left;
      border-bottom: 2px solid #ddd;
      padding: 8px;
      color: #555;
    }
    td {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }
    .warning-box {
      background-color: #fff3cd;
      border: 1px solid #ffeeba;
      color: #856404;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn-group {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    button {
      padding: 10px 20px;
      border-radius: 4px;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      background: #0055a2;
      color: white;
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #e9ecef;
      color: #495057;
    }
    .loader { display: none; text-align: center; margin-top: 20px; }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #0055a2;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 10px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>🚀 Confirmar Evaluación</h1>
  
  <p>Revisa la configuración de pesos antes de iniciar el proceso:</p>
  
  <div class="config-box">
    <table id="config-table">
      <thead>
        <tr>
          <th>Criterio</th>
          <th>Perfil / Max</th>
          <th>Peso / Valor</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="3" style="text-align:center">Cargando configuración...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="warning-box">
    <span>⚠️</span>
    <span>Este proceso puede tardar unos minutos. Se analizarán todas las postulaciones nuevas registradas.</span>
  </div>

  <div id="result-msg" style="margin-bottom: 15px; font-weight: 500; display: none;"></div>

  <div class="btn-group" id="btn-container">
    <button class="btn-secondary" onclick="google.script.host.close()">Cancelar</button>
    <button id="run-btn" class="btn-primary" onclick="runEval()">Ejecutar Evaluación</button>
  </div>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    <span>Procesando postulaciones...</span>
  </div>

  <script>
    function loadConfig() {
      google.script.run
        .withSuccessHandler((config) => {
          const tbody = document.querySelector('#config-table tbody');
          tbody.innerHTML = '';
          
          for (const [criterio, obj] of Object.entries(config)) {
            if (obj.peso) {
              for (const [perfil, peso] of Object.entries(obj.peso)) {
                if (perfil === '_perfil') continue;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${criterio}</td><td>${perfil}</td><td>${peso}</td>`;
                tbody.appendChild(tr);
              }
            }
            if (obj.MaxPuntaje !== undefined) {
              const tr = document.createElement('tr');
              tr.style.background = '#e9f2fa';
              tr.innerHTML = `<td>${criterio}</td><td><strong>Máximo</strong></td><td><strong>${obj.MaxPuntaje}</strong></td>`;
              tbody.appendChild(tr);
            }
          }
        })
        .getConfiguracion();
    }

    function runEval() {
      document.getElementById('btn-container').style.display = 'none';
      document.getElementById('loader').style.display = 'block';
      document.getElementById('run-btn').disabled = true;

      google.script.run
        .withSuccessHandler((msg) => {
          document.getElementById('loader').style.display = 'none';
          const res = document.getElementById('result-msg');
          res.textContent = msg;
          res.style.display = 'block';
          res.style.color = '#155724';
          
          const closeBtn = document.createElement('button');
          closeBtn.className = 'btn-primary';
          closeBtn.textContent = 'Cerrar';
          closeBtn.onclick = () => google.script.host.close();
          document.getElementById('btn-container').innerHTML = '';
          document.getElementById('btn-container').appendChild(closeBtn);
          document.getElementById('btn-container').style.display = 'flex';
        })
        .withFailureHandler((err) => {
          document.getElementById('loader').style.display = 'none';
          const res = document.getElementById('result-msg');
          res.textContent = 'Error: ' + err.message;
          res.style.display = 'block';
          res.style.color = '#dc3545';
          document.getElementById('btn-container').style.display = 'flex';
        })
        .evaluarPostulacionesPUCV2();
    }

    window.onload = loadConfig;
  </script>
</body>
</html>
