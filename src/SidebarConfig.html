<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      padding: 15px;
      margin: 0;
      background-color: #f8f9fa;
      color: #333;
      font-size: 14px;
    }
    h1 {
      color: #003366;
      font-size: 18px;
      margin-top: 0;
      border-bottom: 2px solid #0055a2;
      padding-bottom: 8px;
    }
    .section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 15px;
      overflow: hidden;
    }
    .section-header {
      background: #e9f2fa;
      padding: 10px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      color: #003366;
    }
    .section-content {
      padding: 10px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
      font-size: 12px;
      color: #666;
    }
    input[type="number"] {
      width: 100%;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-primary {
      background-color: #0055a2;
      color: white;
    }
    .btn-primary:hover {
      background-color: #003366;
    }
    .btn-secondary {
      background-color: #6c757d;
      color: white;
    }
    .btn-secondary:hover {
      background-color: #5a6268;
    }
    #status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      display: none;
      font-size: 12px;
      text-align: center;
    }
    .status-success {
      background-color: #d4edda;
      color: #155724;
      display: block !important;
    }
    .status-error {
      background-color: #f8d7da;
      color: #721c24;
      display: block !important;
    }
    .loading {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>⚙️ Configuración de Pesos</h1>
  
  <div id="config-form">
    <!-- Uso de Inglés -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        Uso de Inglés <span>▼</span>
      </div>
      <div class="section-content">
        <div class="form-group">
          <label>Peso Estudiante</label>
          <input type="number" id="UsoIngles-estudiante" step="0.25" min="0" max="5">
        </div>
        <div class="form-group">
          <label>Peso Funcionario</label>
          <input type="number" id="UsoIngles-funcionario" step="0.25" min="0" max="5">
        </div>
        <div class="form-group">
          <label>Peso Académico</label>
          <input type="number" id="UsoIngles-academico" step="0.25" min="0" max="5">
        </div>
        <div class="form-group">
          <label>Puntaje Máximo</label>
          <input type="number" id="UsoIngles-MaxPuntaje" step="1" min="1" max="10">
        </div>
      </div>
    </div>

    <!-- Internacionalización -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        Internacionalización <span>▼</span>
      </div>
      <div class="section-content">
        <div class="form-group">
          <label>Peso Estudiante</label>
          <input type="number" id="Internacionalizacion-estudiante" step="0.25" min="0" max="5">
        </div>
        <div class="form-group">
          <label>Peso Funcionario</label>
          <input type="number" id="Internacionalizacion-funcionario" step="0.25" min="0" max="5">
        </div>
        <div class="form-group">
          <label>Peso Académico</label>
          <input type="number" id="Internacionalizacion-academico" step="0.25" min="0" max="5">
        </div>
        <div class="form-group">
          <label>Puntaje Máximo</label>
          <input type="number" id="Internacionalizacion-MaxPuntaje" step="1" min="1" max="10">
        </div>
      </div>
    </div>

    <!-- Carta de Respaldo -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        Carta de Respaldo <span>▼</span>
      </div>
      <div class="section-content">
        <div class="form-group">
          <label>Peso Estudiante</label>
          <input type="number" id="CartaRespaldo-estudiante" step="0.25" min="0" max="5">
        </div>
        <div class="form-group">
          <label>Peso Funcionario</label>
          <input type="number" id="CartaRespaldo-funcionario" step="0.25" min="0" max="5">
        </div>
        <div class="form-group">
          <label>Peso Académico</label>
          <input type="number" id="CartaRespaldo-academico" step="0.25" min="0" max="5">
        </div>
      </div>
    </div>
  </div>

  <div class="button-group">
    <button class="btn-primary" onclick="save()">Guardar Cambios</button>
    <button class="btn-secondary" onclick="reset()">Restaurar Default</button>
  </div>

  <div id="status"></div>

  <script>
    function toggleSection(header) {
      const content = header.nextElementSibling;
      const span = header.querySelector('span');
      if (content.style.display === 'none') {
        content.style.display = 'block';
        span.textContent = '▼';
      } else {
        content.style.display = 'none';
        span.textContent = '▶';
      }
    }

    function showStatus(msg, isError = false) {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.className = isError ? 'status-error' : 'status-success';
      setTimeout(() => { status.style.display = 'none'; }, 4000);
    }

    function populate(config) {
      document.body.classList.remove('loading');
      if (!config) {
        showStatus('Error al cargar configuración', true);
        return;
      }
      
      // Uso Inglés
      document.getElementById('UsoIngles-estudiante').value = config.UsoIngles.peso.estudiante;
      document.getElementById('UsoIngles-funcionario').value = config.UsoIngles.peso.funcionario;
      document.getElementById('UsoIngles-academico').value = config.UsoIngles.peso.academico;
      document.getElementById('UsoIngles-MaxPuntaje').value = config.UsoIngles.MaxPuntaje;

      // Internacionalizacion
      document.getElementById('Internacionalizacion-estudiante').value = config.Internacionalizacion.peso.estudiante;
      document.getElementById('Internacionalizacion-funcionario').value = config.Internacionalizacion.peso.funcionario;
      document.getElementById('Internacionalizacion-academico').value = config.Internacionalizacion.peso.academico;
      document.getElementById('Internacionalizacion-MaxPuntaje').value = config.Internacionalizacion.MaxPuntaje;

      // Carta
      document.getElementById('CartaRespaldo-estudiante').value = config.CartaRespaldo.peso.estudiante;
      document.getElementById('CartaRespaldo-funcionario').value = config.CartaRespaldo.peso.funcionario;
      document.getElementById('CartaRespaldo-academico').value = config.CartaRespaldo.peso.academico;
    }

    function save() {
      document.body.classList.add('loading');
      const data = {
        UsoIngles: {
          peso: {
            estudiante: parseFloat(document.getElementById('UsoIngles-estudiante').value),
            funcionario: parseFloat(document.getElementById('UsoIngles-funcionario').value),
            academico: parseFloat(document.getElementById('UsoIngles-academico').value)
          },
          MaxPuntaje: parseFloat(document.getElementById('UsoIngles-MaxPuntaje').value)
        },
        Internacionalizacion: {
          peso: {
            estudiante: parseFloat(document.getElementById('Internacionalizacion-estudiante').value),
            funcionario: parseFloat(document.getElementById('Internacionalizacion-funcionario').value),
            academico: parseFloat(document.getElementById('Internacionalizacion-academico').value)
          },
          MaxPuntaje: parseFloat(document.getElementById('Internacionalizacion-MaxPuntaje').value)
        },
        CartaRespaldo: {
          peso: {
            estudiante: parseFloat(document.getElementById('CartaRespaldo-estudiante').value),
            funcionario: parseFloat(document.getElementById('CartaRespaldo-funcionario').value),
            academico: parseFloat(document.getElementById('CartaRespaldo-academico').value)
          }
        }
      };

      google.script.run
        .withSuccessHandler((msg) => {
          document.body.classList.remove('loading');
          showStatus(msg);
        })
        .withFailureHandler((err) => {
          document.body.classList.remove('loading');
          showStatus(err.message, true);
        })
        .saveConfiguracion(data);
    }

    function reset() {
      if (confirm('¿Estás seguro de restaurar los valores por defecto?')) {
        document.body.classList.add('loading');
        google.script.run
          .withSuccessHandler(populate)
          .withFailureHandler((err) => {
            document.body.classList.remove('loading');
            showStatus(err.message, true);
          })
          .resetConfiguracion();
      }
    }

    // Load initial data
    window.onload = () => {
      document.body.classList.add('loading');
      google.script.run
        .withSuccessHandler(populate)
        .withFailureHandler((err) => {
          document.body.classList.remove('loading');
          showStatus(err.message, true);
        })
        .getConfiguracion();
    };
  </script>
</body>
</html>
